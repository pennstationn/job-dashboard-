<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Search — B</title>
<style>
:root{--bg:#f9f8f6;--card:#fff;--border:#e8e6e1;--b2:#d4d0c8;--tx:#1a1917;--t2:#6b6860;--t3:#a8a49c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--tx)}
.page{max-width:1000px;margin:0 auto;padding:36px 24px 80px}
header{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
h1{font-size:20px;font-weight:normal;margin-bottom:3px}
header p{font-size:12px;color:var(--t3);font-family:'Courier New',monospace}
.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.tabs{display:flex}
.tab{font-size:12px;padding:5px 13px;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:'Courier New',monospace;transition:all .15s}
.tab:first-child{border-radius:4px 0 0 4px}
.tab:last-child{border-radius:0 4px 4px 0}
.tab:not(:last-child){border-right:none}
.tab.active{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.ctrl{display:flex;gap:6px}
input,select{font-size:12px;padding:5px 9px;border:1px solid var(--b2);border-radius:4px;background:var(--card);color:var(--tx);font-family:'Courier New',monospace}
input{width:150px}input:focus{outline:none;border-color:var(--tx)}
.panel{display:none}.panel.active{display:block}
.sec{font-size:10px;font-family:'Courier New',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:22px 0 7px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:11px 12px}
.kw{font-size:12px;font-weight:bold;font-family:'Courier New',monospace;margin-bottom:8px;line-height:1.4}
.btns{display:flex;gap:4px}
a.btn{font-size:11px;padding:3px 10px;border-radius:3px;text-decoration:none;font-family:'Courier New',monospace;white-space:nowrap;transition:opacity .12s}
a.btn:hover{opacity:.7}
.li{background:#dbeafe;color:#1e40af}
.goo{background:#dcfce7;color:#166534}
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:6px}
.co{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:11px 12px}
.co-n{font-size:12px;font-weight:bold;font-family:'Courier New',monospace;margin-bottom:2px}
.co-s{font-size:10px;color:var(--t3);font-family:'Courier New',monospace;margin-bottom:8px}
.hr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:5px}
.hr-kw{font-size:12px;font-family:'Courier New',monospace}
.legend{font-size:11px;color:var(--t3);font-family:'Courier New',monospace;margin-bottom:10px}
.empty{font-size:12px;color:var(--t3);font-family:'Courier New',monospace;padding:1rem 0}
</style>
</head>
<body>
<div class="page">
<header>
  <h1>Job Search Dashboard</h1>
  <p>B · BD & Partnerships · KAM · Commercial · Istanbul</p>
</header>
<div class="top">
  <div class="tabs">
    <button class="tab active" onclick="sw('kw',this)">Keywords</button>
    <button class="tab" onclick="sw('co',this)">Şirketler</button>
    <button class="tab" onclick="sw('hr',this)">Hiring posts</button>
  </div>
  <div class="ctrl">
    <input type="text" placeholder="filtrele..." id="s" oninput="render()" onkeydown="if(event.key==='Enter')render()">
    <select id="t" onchange="render()">
      <option value="qdr:d">Son 24 saat</option>
      <option value="qdr:d2">Son 48 saat</option>
      <option value="qdr:w">Son 1 hafta</option>
      <option value="qdr:m">Son 1 ay</option>
      <option value="">Tüm zamanlar</option>
    </select>
  </div>
</div>
<div id="panel-kw" class="panel active">
  <div class="legend">🔵 LinkedIn jobs &nbsp;·&nbsp; 🟢 Google (LinkedIn dışı kariyer sayfaları + ATS)</div>
  <div id="kw-out"></div>
</div>
<div id="panel-co" class="panel"><div id="co-out"></div></div>
<div id="panel-hr" class="panel"><div id="hr-out"></div></div>
</div>
<script>
const KWS=[
  {t:'Business Development Manager',c:'bd'},
  {t:'Business Development and Partnerships Manager',c:'bd'},
  {t:'Partnerships Manager',c:'bd'},
  {t:'Strategic Partnerships Manager',c:'bd'},
  {t:'Partner Manager',c:'bd'},
  {t:'Partner Business Development Manager',c:'bd'},
  {t:'Brand Partnership Manager',c:'bd'},
  {t:'Commercial Partnership Manager',c:'bd'},
  {t:'Ecosystem Development Manager',c:'bd'},
  {t:'Alliance Manager',c:'bd'},
  {t:'Go-to-Market Manager',c:'bd'},
  {t:'Market Development Manager',c:'bd'},
  {t:'Market Entry Manager',c:'bd'},
  {t:'Large Customer Sales',c:'bd'},
  {t:'Industry Manager',c:'bd'},
  {t:'Enterprise Account Executive',c:'bd'},
  {t:'Key Account Manager',c:'kam'},
  {t:'Senior Key Account Manager',c:'kam'},
  {t:'Commercial Manager',c:'kam'},
  {t:'Global Account Manager',c:'kam'},
  {t:'Account Manager Enterprise',c:'kam'},
  {t:'Trade Marketing Manager',c:'kam'},
  {t:'Revenue Growth Manager',c:'kam'},
  {t:'Category Manager',c:'ch'},
  {t:'E-commerce Manager',c:'ch'},
  {t:'Channel Manager',c:'ch'},
  {t:'Vendor Manager',c:'ch'},
  {t:'Marketplace Manager',c:'ch'},
  {t:'Merchant Success Manager',c:'ch'},
];
const SECS={bd:'BD & Partnerships',kam:'KAM / Commercial',ch:'Channel / Ecom / Vendor'};
const T=()=>document.getElementById('t').value;
function liUrl(kw,t){
  let tf=t==='qdr:d'?'r86400':t==='qdr:d2'?'r172800':t==='qdr:w'?'r604800':t==='qdr:m'?'r2592000':'';
  return 'https://www.linkedin.com/jobs/search/?keywords='+encodeURIComponent(kw)+'&location=Istanbul%2C%20Turkey'+(tf?'&f_TPR='+tf:'');
}
function gUrl(kw,t){
  let q='"'+kw+'" AND ("Istanbul" OR "Turkey") AND ("careers" OR "jobs" OR "hiring")';
  return 'https://www.google.com/search?q='+encodeURIComponent(q)+(t?'&tbs='+t:'');
}
function kwCard(k){
  let t=T();
  return '<div class="card"><div class="kw">'+k.t+'</div><div class="btns"><a class="btn li" href="'+liUrl(k.t,t)+'" target="_blank">LinkedIn</a><a class="btn goo" href="'+gUrl(k.t,t)+'" target="_blank">Google</a></div></div>';
}
function render(){
  let s=(document.getElementById('s').value||'').toLowerCase().trim();
  let h='';
  ['bd','kam','ch'].forEach(sec=>{
    let items=KWS.filter(k=>k.c===sec&&(!s||k.t.toLowerCase().includes(s)));
    if(!items.length)return;
    h+='<div class="sec">'+SECS[sec]+'</div><div class="grid">'+items.map(kwCard).join('')+'</div>';
  });
  document.getElementById('kw-out').innerHTML=h||'<p class="empty">sonuç yok</p>';
}
const COS=[
  {n:'Google TR',s:'Tech',u:'https://careers.google.com/jobs/results/?location=Istanbul%2C+Turkey'},
  {n:'Microsoft TR',s:'Tech',u:'https://jobs.careers.microsoft.com/global/en/search?lc=Istanbul%2CTurkey'},
  {n:'Meta TR',s:'Tech',u:'https://www.metacareers.com/jobs/?offices[0]=Istanbul'},
  {n:'Amazon TR',s:'Tech',u:'https://www.amazon.jobs/en/search?country%5B%5D=TUR&city%5B%5D=Istanbul'},
  {n:'SAP TR',s:'Tech',u:'https://jobs.sap.com/search/?searchby=location&q=Istanbul'},
  {n:'Salesforce TR',s:'Tech',u:'https://salesforce.wd12.myworkdayjobs.com/External_Career_Site?locationCountry=TUR'},
  {n:'Oracle TR',s:'Tech',u:'https://eeho.fa.us6.oraclecloud.com/hcmUI/CandidateExperience/en/sites/jobsearch/requisitions?location=Turkey'},
  {n:'IBM TR',s:'Tech',u:'https://www.ibm.com/careers/search?field_keyword_08[0]=Turkey'},
  {n:'Amadeus',s:'Tech',u:'https://careers.amadeus.com/search#/?country=Turkey'},
  {n:'Insider',s:'Tech',u:'https://useinsider.com/careers/'},
  {n:'Booking.com',s:'Tech',u:'https://jobs.booking.com/careers?query=&location=Istanbul'},
  {n:'Mastercard TR',s:'Fintech',u:'https://careers.mastercard.com/us/en/istanbul-turkiye'},
  {n:'Visa TR',s:'Fintech',u:'https://corporate.visa.com/en/jobs/careers/search-results#country=TUR'},
  {n:'iyzico',s:'Fintech',u:'https://www.iyzico.com/en/about-us/career'},
  {n:'Papara',s:'Fintech',u:'https://papara.com/kariyer'},
  {n:'PayCore',s:'Fintech',u:'https://paycore.com/careers/'},
  {n:'Hepsiburada',s:'E-comm',u:'https://www.hepsiburada.com/kariyer'},
  {n:'Getir',s:'E-comm',u:'https://getir.com/careers/'},
  {n:'Sahibinden',s:'E-comm',u:'https://www.sahibinden.com/kariyer'},
  {n:'H&M',s:'Retail',u:'https://career.hm.com/content/hmcareer/en_gb/workingathm/search-jobs.html?country=TR'},
  {n:'Mavi',s:'Retail',u:'https://career5.successfactors.eu/portalcareer?company=Mavi'},
  {n:'Decathlon TR',s:'Retail',u:'https://kesfet.decathlon.com.tr/ilanlar/'},
  {n:'Adidas TR',s:'Retail',u:'https://careers.adidas-group.com/jobs?query=&country=TR'},
  {n:'Nestle TR',s:'FMCG',u:'https://www.nestle.com/jobs/search-jobs#country=Turkey'},
  {n:'P&G TR',s:'FMCG',u:'https://www.pgcareers.com/global/en/search-results?location=Turkey'},
  {n:'Loreal TR',s:'FMCG',u:'https://careers.loreal.com/en_US/jobs/SearchJobs/Turkey'},
  {n:'Coca-Cola TR',s:'FMCG',u:'https://careers.coca-colacompany.com/job-search-results/?location=Turkey'},
  {n:'Diageo TR',s:'FMCG',u:'https://diageo.wd3.myworkdayjobs.com/Diageo_Careers?locationCountry=TR'},
  {n:'Anadolu Efes',s:'FMCG',u:'https://careers.smartrecruiters.com/AnadoluEfes'},
  {n:'Siemens TR',s:'Other',u:'https://jobs.siemens.com/jobs?search=&location=Istanbul%2C+Turkey'},
  {n:'Shell TR',s:'Other',u:'https://www.shell.com/careers/explore-jobs.html?search=&country=Turkey'},
  {n:'BAT TR',s:'Other',u:'https://careers.bat.com/search/?q=&locationsearch=Turkey'},
];
function renderCo(){
  let s=(document.getElementById('s').value||'').toLowerCase();
  let h='';
  ['Tech','Fintech','E-comm','Retail','FMCG','Other'].forEach(sec=>{
    let g=COS.filter(c=>c.s===sec&&(!s||c.n.toLowerCase().includes(s)));
    if(!g.length)return;
    h+='<div class="sec">'+sec+'</div><div class="co-grid">'+g.map(c=>'<div class="co"><div class="co-n">'+c.n+'</div><div class="co-s">'+c.s+'</div><div class="btns"><a class="btn goo" href="'+c.u+'" target="_blank">Kariyer</a></div></div>').join('')+'</div>';
  });
  document.getElementById('co-out').innerHTML=h||'<p class="empty">sonuç yok</p>';
}
const HIRING=['işe alıyoruz','ekibimize katıl','açık pozisyon Istanbul','arıyoruz Istanbul','arayışımız var Istanbul',"we're hiring business development Istanbul",'hiring partnerships manager Istanbul','hiring key account manager Istanbul','now hiring commercial Turkey','#hiring Istanbul'];
function renderHiring(){
  let h='<div class="sec">LinkedIn post araması</div>';
  HIRING.forEach(kw=>{
    let d='https://www.linkedin.com/search/results/content/?keywords='+encodeURIComponent(kw)+'&datePosted=%5B%22past-24h%22%5D&origin=FACETED_SEARCH';
    let w='https://www.linkedin.com/search/results/content/?keywords='+encodeURIComponent(kw)+'&datePosted=%5B%22past-week%22%5D&origin=FACETED_SEARCH';
    h+='<div class="hr"><span class="hr-kw">'+kw+'</span><div class="btns"><a class="btn li" href="'+d+'" target="_blank">24s</a><a class="btn li" href="'+w+'" target="_blank">1 hafta</a></div></div>';
  });
  document.getElementById('hr-out').innerHTML=h;
}
function sw(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}
render();renderCo();renderHiring();
</script>
</body>
</html>
